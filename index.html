<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 SNS 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --game-c: #3B6D11; --game-bg: #EAF3DE; --game-border: #639922;
    --fun-c:  #993C1D; --fun-bg:  #FAECE7; --fun-border: #D85A30;
    --kr-c:   #185FA5; --kr-bg:   #E6F1FB; --kr-border:  #378ADD;
    --jp-c:   #0F6E56; --jp-bg:   #E1F5EE; --jp-border:  #1D9E75;
    --en-c:   #3C3489; --en-bg:   #EEEDFE; --en-border:  #7F77DD;
    --bg: #F8F7F4; --surface: #FFFFFF;
    --border: rgba(0,0,0,0.09);
    --text: #1a1a18; --text-2: #6b6b67; --text-3: #9e9d99;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .app-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center;
    justify-content: space-between; height: 56px;
    position: sticky; top: 0; z-index: 10;
  }
  .app-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .legend { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .legend-chip {
    font-size: 13px; font-weight: 600; padding: 5px 14px;
    border-radius: 20px; border: 1.5px solid; white-space: nowrap;
  }
  .legend-chip.game { background: var(--game-border); color: #fff; border-color: var(--game-border); }
  .legend-chip.fun  { background: var(--fun-border);  color: #fff; border-color: var(--fun-border); }
  .legend-chip.kr   { background: var(--kr-bg);   color: var(--kr-c);   border-color: var(--kr-border); }
  .legend-chip.jp   { background: var(--jp-bg);   color: var(--jp-c);   border-color: var(--jp-border); }
  .legend-chip.en   { background: var(--en-bg);   color: var(--en-c);   border-color: var(--en-border); }
  .btn-add {
    background: var(--text); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 7px 14px;
    font-size: 13px; font-family: inherit; cursor: pointer;
    font-weight: 500; transition: opacity 0.15s; white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.8; }

  .cal-wrap { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .cal-nav-btns { display: flex; gap: 6px; }
  .nav-btn {
    width: 32px; height: 32px; border: 1px solid var(--border);
    background: var(--surface); border-radius: var(--radius-sm);
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .nav-btn:hover { background: var(--bg); }

  .cal-grid {
    display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
    border-radius: var(--radius); border: 1px solid var(--border);
    overflow: hidden; background: var(--border); gap: 1px;
  }
  .dow {
    background: var(--surface); padding: 8px 10px;
    font-size: 11px; font-weight: 600; color: var(--text-3);
    text-align: center; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .dow.sun { color: #DC2626; }
  .dow.sat { color: #2563EB; }
  .day {
    background: var(--surface); min-height: 120px; padding: 8px;
    cursor: pointer; transition: background 0.1s; position: relative;
  }
  .day:hover { background: #FAFAF8; }
  .day.other { background: #FBFAF8; }
  .day.other .day-num { color: var(--text-3); }
  .day-num {
    font-size: 12px; font-weight: 500; color: var(--text-2);
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; margin-bottom: 3px;
  }
  .day.today .day-num { background: var(--text); color: #fff; }
  .day.is-sun .day-num { color: #DC2626; }
  .day.is-sat .day-num { color: #2563EB; }
  .day.is-sun.today .day-num, .day.is-sat.today .day-num { color: #fff; }

  .event {
    height: 20px; line-height: 20px;
    padding: 0 6px; font-size: 11px;
    margin-bottom: 2px; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; cursor: pointer; font-weight: 500;
    transition: opacity 0.1s; position: relative;
    border-radius: 4px;
  }
  .event:hover { opacity: 0.8; }
  .event.game { background: var(--game-border); color: #fff; }
  .event.fun  { background: var(--fun-border);  color: #fff; }
  .event.kr   { background: var(--kr-bg);   color: var(--kr-c);   }
  .event.jp   { background: var(--jp-bg);   color: var(--jp-c);   }
  .event.en   { background: var(--en-bg);   color: var(--en-c);   }
  .event.span-start {
    border-radius: 4px 0 0 4px;
    margin-right: -1px;
  }
  .event.span-mid {
    border-radius: 0;
    margin-left: -1px; margin-right: -1px;
    padding: 0 2px;
  }
  .event.span-end {
    border-radius: 0 4px 4px 0;
    margin-left: -1px;
    padding: 0 2px;
  }
  .event.span-mid, .event.span-end { overflow: hidden; }

  /* row slot system — each event occupies a vertical slot consistently */
  .day-events { position: relative; }

  .event.dragging { opacity: 0.4; cursor: grabbing; }
  .event[draggable="true"] { cursor: grab; }
  .day.drag-over { background: #EFF6FF; outline: 2px dashed #378ADD; outline-offset: -2px; }

  .day-add {
    position: absolute; bottom: 5px; right: 5px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text-3); font-size: 14px; line-height: 1;
    display: none; align-items: center; justify-content: center; cursor: pointer;
  }
  .day:hover .day-add { display: flex; }

  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.3); z-index: 100;
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px; padding: 24px;
    width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
  .form-row { margin-bottom: 13px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 5px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; font-family: inherit;
    color: var(--text); background: var(--surface);
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: rgba(0,0,0,0.3); }
  .form-textarea { resize: vertical; min-height: 60px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .btn-cancel, .btn-save, .btn-del {
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-family: inherit; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); transition: opacity 0.1s;
  }
  .btn-cancel { background: var(--surface); color: var(--text-2); }
  .btn-save   { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-del    { background: #FEE2E2; color: #991B1B; border-color: #FECACA; margin-right: auto; }
  .btn-cancel:hover, .btn-save:hover, .btn-del:hover { opacity: 0.75; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 10px 18px;
    border-radius: 20px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 200; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 700px) {
    .legend { display: none; }
    .cal-wrap { padding: 12px; }
    .app-header { padding: 0 12px; }
    .day { min-height: 80px; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Global SNS Calendar</div>
  <div class="header-right">
    <div class="legend">
      <div class="legend-chip game">게임 콘텐츠 소재 (공통)</div>
      <div class="legend-chip fun">Fun/참여형 (공통)</div>
      <div class="legend-chip kr">KR 단독</div>
      <div class="legend-chip jp">JP 단독</div>
      <div class="legend-chip en">EN 단독</div>
    </div>
    <button class="btn-add" onclick="openAdd()">+ 소재 추가</button>
  </div>
</header>

<div class="cal-wrap">
  <div class="cal-nav">
    <div class="cal-month" id="month-label"></div>
    <div class="cal-nav-btns">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
  </div>
  <div class="cal-grid" id="cal">
    <div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;height:200px;font-size:13px;color:var(--text-3)">불러오는 중...</div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">소재 추가</div>
    <div class="form-row">
      <label class="form-label">소재명 *</label>
      <input class="form-input" id="f-name" placeholder="예: 봄 시즌 이벤트 피드" />
    </div>
    <div class="form-row">
      <label class="form-label">분류 *</label>
      <select class="form-select" id="f-region">
        <option value="game">🎮 게임 콘텐츠 소재 (공통)</option>
        <option value="fun">🎉 Fun/참여형 (공통)</option>
        <option value="kr">🇰🇷 KR 단독</option>
        <option value="jp">🇯🇵 JP 단독</option>
        <option value="en">🌐 EN 단독</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">플랫폼</label>
      <input class="form-input" id="f-platform" placeholder="예: Instagram, TikTok, Facebook" />
    </div>
    <div class="form-row form-row-2">
      <div>
        <label class="form-label">시작일 *</label>
        <input type="date" class="form-input" id="f-start" />
      </div>
      <div>
        <label class="form-label">종료일 *</label>
        <input type="date" class="form-input" id="f-end" />
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">메모</label>
      <textarea class="form-textarea" id="f-note" placeholder="추가 설명, 담당자, 링크 등"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-del" id="btn-del" style="display:none" onclick="deleteEvent()">삭제</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ahetdkarbdrmsuahawag.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qXPGvnM2PyP_-Dv1LKImvw_unm4vuKU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const REGION_LABELS = {
  game: '게임 콘텐츠 소재 (공통)',
  fun:  'Fun/참여형 (공통)',
  kr:   'KR 단독',
  jp:   'JP 단독',
  en:   'EN 단독'
};

let events = [], curYear, curMonth, editId = null;
const today = new Date();
curYear = today.getFullYear();
curMonth = today.getMonth();

async function loadEvents() {
  const { data, error } = await sb.from('events').select('*');
  if (error) { showToast('데이터 로드 실패'); return; }
  events = data || [];
  render();
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }
function toDateStr(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }

function changeMonth(d) {
  curMonth += d;
  if (curMonth < 0) { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0; curYear++; }
  render();
}

function render() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('month-label').textContent = `${curYear}년 ${months[curMonth]}`;
  const cal = document.getElementById('cal');
  cal.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'dow' + (i===0?' sun':i===6?' sat':'');
    el.textContent = d; cal.appendChild(el);
  });
  const first = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const daysInPrev = new Date(curYear, curMonth, 0).getDate();
  const totalCells = Math.ceil((first + daysInMonth) / 7) * 7;
  const totalWeeks = totalCells / 7;

  // build date array
  const dates = [];
  for (let i = 0; i < totalCells; i++) {
    let date, isOther = false;
    if (i < first) { date = new Date(curYear, curMonth-1, daysInPrev - first + i + 1); isOther = true; }
    else if (i >= first + daysInMonth) { date = new Date(curYear, curMonth+1, i - first - daysInMonth + 1); isOther = true; }
    else { date = new Date(curYear, curMonth, i - first + 1); }
    dates.push({ date, isOther, ds: toDateStr(date.getFullYear(), date.getMonth(), date.getDate()) });
  }

  // assign slots per week row — so spanning events stay on same row
  // slots[weekIdx][slotIdx] = evId or null
  const weekSlots = Array.from({length: totalWeeks}, () => []);
  const evSlotMap = {}; // evId -> slot index (per week)

  for (let w = 0; w < totalWeeks; w++) {
    const weekDates = dates.slice(w*7, w*7+7).map(d => d.ds);
    const slots = weekSlots[w];
    const eventsThisWeek = events.filter(ev =>
      weekDates.some(ds => ev.start_date <= ds && ev.end_date >= ds)
    );
    // sort: multi-day first, then by start
    eventsThisWeek.sort((a,b) => {
      const aLen = (new Date(a.end_date) - new Date(a.start_date));
      const bLen = (new Date(b.end_date) - new Date(b.start_date));
      if (bLen !== aLen) return bLen - aLen;
      return a.start_date < b.start_date ? -1 : 1;
    });
    eventsThisWeek.forEach(ev => {
      // find first free slot
      let slot = 0;
      while (true) {
        const occupied = slots[slot] || [];
        const conflict = weekDates.some((ds, di) => {
          if (ev.start_date <= ds && ev.end_date >= ds) {
            return occupied[di];
          }
          return false;
        });
        if (!conflict) break;
        slot++;
      }
      if (!slots[slot]) slots[slot] = {};
      weekDates.forEach((ds, di) => {
        if (ev.start_date <= ds && ev.end_date >= ds) slots[slot][di] = ev.id;
      });
      if (!evSlotMap[ev.id]) evSlotMap[ev.id] = {};
      evSlotMap[ev.id][w] = slot;
    });
  }

  // render cells
  for (let i = 0; i < totalCells; i++) {
    const { date, isOther, ds } = dates[i];
    const cell = document.createElement('div');
    const dow = i % 7;
    cell.className = 'day' + (isOther ? ' other' : '') + (dow===0?' is-sun':dow===6?' is-sat':'');
    if (!isOther && date.getDate() === today.getDate() &&
        date.getMonth() === today.getMonth() &&
        date.getFullYear() === today.getFullYear())
      cell.classList.add('today');

    const numDiv = document.createElement('div');
    numDiv.className = 'day-num';
    numDiv.textContent = date.getDate();
    cell.appendChild(numDiv);

    const w = Math.floor(i / 7);
    const d = i % 7;
    const slots = weekSlots[w];
    const maxSlot = slots.length;

    // render each slot
    for (let slot = 0; slot < maxSlot; slot++) {
      const slotData = slots[slot] || {};
      const evId = slotData[d];
      if (!evId) {
        // empty placeholder to keep alignment
        const ph = document.createElement('div');
        ph.style.cssText = 'height:22px;margin-bottom:2px';
        cell.appendChild(ph);
        continue;
      }
      const ev = events.find(e => e.id === evId);
      if (!ev) continue;

      // is this the start of the event in this week?
      const weekStart = dates[w*7].ds;
      const isWeekStart = ev.start_date >= weekStart ? ev.start_date === ds : d === 0;
      const weekEnd = dates[w*7+6].ds;
      const isWeekEnd = ev.end_date <= weekEnd ? ev.end_date === ds : d === 6;
      const isTrueStart = ev.start_date === ds;
      const isTrueEnd = ev.end_date === ds;

      const el = document.createElement('div');
      el.className = `event ${ev.region}`;
      el.style.marginBottom = '2px';

      if (isTrueStart && isTrueEnd) {
        // single day
      } else if (isWeekStart && isWeekEnd) {
        el.classList.add('span-start');
        el.style.borderRadius = isTrueStart ? '4px 0 0 4px' : '0';
        el.style.borderRadius = (isTrueStart ? '4px' : '0') + ' 0 0 ' + (isTrueStart ? '4px' : '0');
      } else if (isWeekStart) {
        el.classList.add('span-start');
        el.style.borderRadius = isTrueStart ? '4px 0 0 4px' : '0 0 0 0';
        el.style.marginRight = '-1px';
      } else if (isWeekEnd) {
        el.classList.add('span-end');
        el.style.borderRadius = isTrueEnd ? '0 4px 4px 0' : '0';
        el.style.marginLeft = '-1px';
        el.style.padding = '0 2px';
      } else {
        el.classList.add('span-mid');
        el.style.borderRadius = '0';
        el.style.marginLeft = '-1px';
        el.style.marginRight = '-1px';
        el.style.padding = '0';
      }

      // show label only on start cell of week
      if (isWeekStart) {
        el.textContent = ev.name;
      } else {
        el.textContent = '\u00a0';
      }

      el.title = `${ev.name}\n${REGION_LABELS[ev.region] || ev.region}\n${ev.start_date} ~ ${ev.end_date}${ev.note ? '\n' + ev.note : ''}`;
      el.onclick = e => { e.stopPropagation(); openEdit(ev.id); };

      // drag: only from start cell
      if (isWeekStart) {
        el.draggable = true;
        el.addEventListener('dragstart', e => {
          e.stopPropagation();
          e.dataTransfer.setData('evId', ev.id);
          e.dataTransfer.setData('origStart', ev.start_date);
          e.dataTransfer.setData('origEnd', ev.end_date);
          setTimeout(() => el.classList.add('dragging'), 0);
        });
        el.addEventListener('dragend', () => el.classList.remove('dragging'));
      }

      cell.appendChild(el);
    }

    const addBtn = document.createElement('div');
    addBtn.className = 'day-add'; addBtn.textContent = '+';
    addBtn.onclick = e => { e.stopPropagation(); openAdd(ds); };
    cell.appendChild(addBtn);

    // drop target
    cell.addEventListener('dragover', e => {
      e.preventDefault();
      cell.classList.add('drag-over');
    });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', async e => {
      e.preventDefault();
      cell.classList.remove('drag-over');
      const evId = e.dataTransfer.getData('evId');
      const origStart = e.dataTransfer.getData('origStart');
      const origEnd = e.dataTransfer.getData('origEnd');
      if (!evId || !ds) return;

      // shift start/end by same number of days
      const diff = (new Date(ds) - new Date(origStart)) / 86400000;
      const newStart = shiftDate(origStart, diff);
      const newEnd   = shiftDate(origEnd,   diff);

      const { error } = await sb.from('events').update({ start_date: newStart, end_date: newEnd }).eq('id', evId);
      if (error) { showToast('이동 실패'); return; }
      showToast('일정 이동됐어요!');
      await loadEvents();
    });

    cal.appendChild(cell);
  }
}

function getEventsForDate(ds) {
  return events.filter(ev => ev.start_date <= ds && ev.end_date >= ds);
}

function shiftDate(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return toDateStr(d.getFullYear(), d.getMonth(), d.getDate());
}

function openAdd(ds) {
  editId = null;
  document.getElementById('modal-title').textContent = '소재 추가';
  document.getElementById('f-name').value = '';
  document.getElementById('f-region').value = 'game';
  document.getElementById('f-platform').value = '';
  document.getElementById('f-start').value = ds || today.toISOString().slice(0,10);
  document.getElementById('f-end').value = ds || today.toISOString().slice(0,10);
  document.getElementById('f-note').value = '';
  document.getElementById('btn-del').style.display = 'none';
  document.getElementById('modal').classList.add('open');
}
function openEdit(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editId = id;
  document.getElementById('modal-title').textContent = '소재 수정';
  document.getElementById('f-name').value = ev.name;
  document.getElementById('f-region').value = ev.region;
  document.getElementById('f-platform').value = ev.platform || '';
  document.getElementById('f-start').value = ev.start_date;
  document.getElementById('f-end').value = ev.end_date;
  document.getElementById('f-note').value = ev.note || '';
  document.getElementById('btn-del').style.display = 'block';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveEvent() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('소재명을 입력해주세요'); return; }
  const start = document.getElementById('f-start').value;
  const end = document.getElementById('f-end').value;
  const payload = {
    name,
    region: document.getElementById('f-region').value,
    platform: document.getElementById('f-platform').value.trim(),
    start_date: start,
    end_date: end < start ? start : end,
    note: document.getElementById('f-note').value.trim()
  };
  let error;
  if (editId) {
    ({ error } = await sb.from('events').update(payload).eq('id', editId));
  } else {
    ({ error } = await sb.from('events').insert(payload));
  }
  if (error) { showToast('저장 실패: ' + error.message); return; }
  showToast(editId ? '수정됐어요!' : '추가됐어요!');
  closeModal();
  await loadEvents();
}

async function deleteEvent() {
  if (!confirm('이 소재를 삭제할까요?')) return;
  const { error } = await sb.from('events').delete().eq('id', editId);
  if (error) { showToast('삭제 실패'); return; }
  showToast('삭제됐어요');
  closeModal();
  await loadEvents();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

sb.channel('events-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, () => loadEvents())
  .subscribe();

loadEvents();
</script>
</body>
